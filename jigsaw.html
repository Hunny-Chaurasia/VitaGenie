<script>
/* ══════════════════════════════════════════════
   HIGH SCORE — stored locally, no login needed
══════════════════════════════════════════════ */
function hsKey(){ return difficulty + '_' + currentPuzzleKey; }

function getHS(){
  const data = JSON.parse(localStorage.getItem('mm_jig_hs') || '{}');
  return data[hsKey()] ?? null;
}

function saveHS(score){
  const data = JSON.parse(localStorage.getItem('mm_jig_hs') || '{}');
  const prev = data[hsKey()] ?? 0;
  let isNew = false;
  if(score > prev){ data[hsKey()] = score; isNew = true; }
  localStorage.setItem('mm_jig_hs', JSON.stringify(data));
  return isNew;
}

function refreshHSDisplay(){
  const hs = getHS();
  document.getElementById('sc-hs').textContent = hs !== null ? hs : '–';
}

/* ══════════════════════════════════════════════
   BUILT-IN PUZZLES
══════════════════════════════════════════════ */
const BUILTIN=[
  {key:'nature',  label:'🌿 Forest',   fn:drawNature},
  {key:'ocean',   label:'🌊 Ocean',    fn:drawOcean},
  {key:'sunset',  label:'🌅 Sunset',   fn:drawSunset},
  {key:'galaxy',  label:'🌌 Galaxy',   fn:drawGalaxy},
  {key:'city',    label:'🏙️ City',     fn:drawCity},
  {key:'flowers', label:'🌸 Flowers',  fn:drawFlowers},
];

function drawNature(ctx,w,h){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#87ceeb');g.addColorStop(.5,'#228b22');g.addColorStop(1,'#1a5c1a');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  ctx.fillStyle='#fffacd';ctx.beginPath();ctx.arc(w*.7,h*.2,h*.09,0,Math.PI*2);ctx.fill();
  for(let i=0;i<7;i++){
    const x=i*(w/6.5)+20,tw=w*.07,th=h*.35;
    ctx.fillStyle=`hsl(${120+i*8},60%,${25+i*4}%)`;
    ctx.beginPath();ctx.moveTo(x,h*.55);ctx.lineTo(x-tw,h*.55+th);ctx.lineTo(x+tw,h*.55+th);ctx.closePath();ctx.fill();
    ctx.fillStyle='#5c3317';ctx.fillRect(x-tw*.2,h*.55+th,tw*.4,h*.1);
  }
}
function drawOcean(ctx,w,h){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#001a33');g.addColorStop(.4,'#003d7a');g.addColorStop(1,'#006994');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  ctx.fillStyle='rgba(255,255,255,.12)';
  for(let i=0;i<12;i++){
    ctx.beginPath();ctx.ellipse(Math.random()*w,h*.3+Math.random()*h*.5,w*.12,h*.015,0,0,Math.PI*2);ctx.fill();
  }
  ctx.fillStyle='#fffde7';ctx.beginPath();ctx.arc(w*.15,h*.12,h*.07,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.06)';
  for(let i=0;i<60;i++){ctx.fillRect(Math.random()*w,Math.random()*h*.4,1.5,1.5);}
}
function drawSunset(ctx,w,h){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#1a1a2e');g.addColorStop(.35,'#e05b2a');g.addColorStop(.55,'#f4a261');g.addColorStop(.7,'#e76f51');g.addColorStop(1,'#264653');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  ctx.fillStyle='#ffcd00';ctx.beginPath();ctx.arc(w*.5,h*.52,h*.13,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#0d1117';ctx.beginPath();ctx.moveTo(0,h*.7);
  for(let x=0;x<=w;x+=w/30){ctx.lineTo(x,h*.65+Math.sin(x/30)*h*.04+Math.random()*h*.02);}
  ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(255,180,50,.15)';ctx.fillRect(w*.35,h*.52,w*.3,h*.48);
}
function drawGalaxy(ctx,w,h){
  ctx.fillStyle='#020408';ctx.fillRect(0,0,w,h);
  for(let i=0;i<300;i++){
    const a=Math.random();ctx.fillStyle=`rgba(255,255,255,${.2+a*.8})`;
    ctx.beginPath();ctx.arc(Math.random()*w,Math.random()*h,a*1.5,0,Math.PI*2);ctx.fill();
  }
  const g=ctx.createRadialGradient(w*.5,h*.5,0,w*.5,h*.5,w*.4);
  g.addColorStop(0,'rgba(100,60,200,.6)');g.addColorStop(.4,'rgba(30,20,80,.3)');g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  const g2=ctx.createRadialGradient(w*.5,h*.5,0,w*.5,h*.5,w*.15);
  g2.addColorStop(0,'rgba(255,220,100,.7)');g2.addColorStop(1,'transparent');
  ctx.fillStyle=g2;ctx.fillRect(0,0,w,h);
}
function drawCity(ctx,w,h){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#0a0a1a');g.addColorStop(.6,'#1a1a3e');g.addColorStop(1,'#2a2a5e');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  for(let i=0;i<80;i++){ctx.fillStyle='rgba(255,255,255,.7)';ctx.fillRect(Math.random()*w,Math.random()*h*.5,1.5,1.5);}
  const cols=['#1a1a2e','#16213e','#0f3460','#1b2838'];
  for(let i=0;i<18;i++){
    const bw=w/22+Math.random()*w/16,bh=h*.2+Math.random()*h*.45,bx=i*(w/17)-5;
    ctx.fillStyle=cols[i%cols.length];ctx.fillRect(bx,h-bh,bw,bh);
    ctx.fillStyle='rgba(255,240,100,.35)';
    for(let wy=h-bh+8;wy<h-8;wy+=12)for(let wx=bx+4;wx<bx+bw-4;wx+=10){
      if(Math.random()>.4)ctx.fillRect(wx,wy,5,7);
    }
  }
}
function drawFlowers(ctx,w,h){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#a8edea');g.addColorStop(1,'#fed6e3');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  const petals=['#ff6b9d','#ff8e53','#ffe66d','#a8ff78','#7b2ff7','#fc466b'];
  for(let f=0;f<18;f++){
    const fx=Math.random()*w,fy=Math.random()*h,fr=w*.05+Math.random()*w*.06;
    const col=petals[Math.floor(Math.random()*petals.length)];
    for(let p=0;p<6;p++){
      ctx.fillStyle=col;ctx.beginPath();
      const a=p*(Math.PI/3),ex=fx+Math.cos(a)*fr,ey=fy+Math.sin(a)*fr;
      ctx.ellipse(ex,ey,fr*.45,fr*.2,a,0,Math.PI*2);ctx.fill();
    }
    ctx.fillStyle='#fff176';ctx.beginPath();ctx.arc(fx,fy,fr*.25,0,Math.PI*2);ctx.fill();
  }
}

function makeBuiltinImg(item,size=200){
  const c=document.createElement('canvas');c.width=size;c.height=size;
  item.fn(c.getContext('2d'),size,size);return c.toDataURL();
}

/* ══════════════════════════════════════════════
   GALLERY
══════════════════════════════════════════════ */
let difficulty='easy';
let currentPuzzleKey='';
let currentImageSrc='';
let uploadedSrc='';

const DIFF_GRID={easy:3,medium:4,hard:5,expert:6};

function selDiff(btn,d){
  difficulty=d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('sc-diff').textContent=d.charAt(0).toUpperCase()+d.slice(1);
  refreshHSDisplay();
}

function buildGallery(){
  const grid=document.getElementById('builtin-grid');grid.innerHTML='';
  BUILTIN.forEach(item=>{
    const img=makeBuiltinImg(item);
    const card=document.createElement('div');card.className='puzzle-card';card.dataset.key=item.key;
    card.innerHTML=`<img src="${img}" alt="${item.label}"/><div class="card-label">${item.label}</div>`;
    card.onclick=()=>{
      document.querySelectorAll('.puzzle-card').forEach(c=>c.classList.remove('selected'));
      card.classList.add('selected');
      currentPuzzleKey=item.key;currentImageSrc=img;uploadedSrc='';
      document.getElementById('upload-preview').style.display='none';
      document.getElementById('start-btn').disabled=false;
      refreshHSDisplay();
    };
    grid.appendChild(card);
  });
}

function handleUpload(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    uploadedSrc=ev.target.result;
    currentPuzzleKey='custom_'+file.name;
    currentImageSrc=uploadedSrc;
    document.querySelectorAll('.puzzle-card').forEach(c=>c.classList.remove('selected'));
    const prev=document.getElementById('upload-preview');
    prev.src=uploadedSrc;prev.style.display='block';
    document.getElementById('start-btn').disabled=false;
    refreshHSDisplay();
  };reader.readAsDataURL(file);
}

document.addEventListener('DOMContentLoaded',()=>{
  const uz=document.getElementById('upload-zone');
  uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('drag');});
  uz.addEventListener('dragleave',()=>uz.classList.remove('drag'));
  uz.addEventListener('drop',e=>{
    e.preventDefault();uz.classList.remove('drag');
    const f=e.dataTransfer.files[0];
    if(f){document.getElementById('file-input').files=e.dataTransfer.files;handleUpload({target:{files:e.dataTransfer.files}});}
  });
});

/* ══════════════════════════════════════════════
   PUZZLE ENGINE
══════════════════════════════════════════════ */
let COLS=3,ROWS=3,TOTAL=9;
let pieces=[];
let trayOrder=[];
let boardSlots=[];
let gameImg=null;
let score=0,timerSec=0,timerInt=null,gameActive=false;
let dragging=null;

const BOARD_MAX=520;
let cellW=0,cellH=0,boardW=0,boardH=0;

function startGame(){
  if(!currentImageSrc)return;
  COLS=ROWS=DIFF_GRID[difficulty];TOTAL=COLS*ROWS;
  score=0;timerSec=0;gameActive=true;
  document.getElementById('sc-score').textContent=0;
  document.getElementById('sc-diff').textContent=difficulty.charAt(0).toUpperCase()+difficulty.slice(1);

  document.getElementById('gallery-screen').style.display='none';
  document.getElementById('puzzle-screen').style.display='block';

  const img=new Image();
  img.onload=()=>{
    gameImg=img;
    setupBoard();buildPieces();renderBoard();renderTray();updateProgress();startTimer();refreshHSDisplay();
  };
  img.src=currentImageSrc;
}

function setupBoard(){
  const asp=gameImg.height/gameImg.width;
  boardW=Math.min(BOARD_MAX,500);boardH=Math.round(boardW*asp);
  cellW=boardW/COLS;cellH=boardH/ROWS;
  const bc=document.getElementById('board-canvas');
  bc.width=boardW;bc.height=boardH;
  document.getElementById('board-wrap').style.width=boardW+'px';
  document.getElementById('ref-thumb').src=currentImageSrc;
}

function buildPieces(){
  boardSlots=Array(TOTAL).fill(null);pieces=[];
  const ids=Array.from({length:TOTAL},(_,i)=>i);
  trayOrder=[...ids].sort(()=>Math.random()-.5);
  ids.forEach(id=>{
    const c=id%COLS,r=Math.floor(id/COLS);
    const pc=document.createElement('canvas');pc.width=cellW;pc.height=cellH;
    const pctx=pc.getContext('2d');
    pctx.drawImage(gameImg,c*cellW*(gameImg.width/boardW),r*cellH*(gameImg.height/boardH),cellW*(gameImg.width/boardW),cellH*(gameImg.height/boardH),0,0,cellW,cellH);
    pieces.push({id,correctCol:c,correctRow:r,currentSlot:null,placed:false,canvas:pc});
  });
}

function renderBoard(){
  const bc=document.getElementById('board-canvas');const ctx=bc.getContext('2d');
  ctx.clearRect(0,0,boardW,boardH);
  ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=1;
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*cellW,0);ctx.lineTo(c*cellW,boardH);ctx.stroke();}
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*cellH);ctx.lineTo(boardW,r*cellH);ctx.stroke();}
  boardSlots.forEach((pid,slot)=>{
    const c=slot%COLS,r=Math.floor(slot/COLS);
    if(pid===null){
      ctx.strokeStyle='rgba(255,255,255,.07)';ctx.setLineDash([4,4]);ctx.lineWidth=1;
      ctx.strokeRect(c*cellW+2,r*cellH+2,cellW-4,cellH-4);ctx.setLineDash([]);
    } else {
      const p=pieces.find(p=>p.id===pid);
      if(p)ctx.drawImage(p.canvas,c*cellW,r*cellH,cellW,cellH);
    }
  });
}

function renderTray(){
  const tray=document.getElementById('tray-wrap');
  Array.from(tray.querySelectorAll('.tray-piece')).forEach(el=>el.remove());
  const thumbSize=Math.min(110,cellW*1.1);
  trayOrder.forEach(pid=>{
    const p=pieces.find(p=>p.id===pid);
    if(!p||p.placed)return;
    const tc=document.createElement('canvas');
    tc.width=thumbSize;tc.height=thumbSize*(cellH/cellW);
    tc.className='tray-piece';tc.dataset.pid=pid;
    tc.getContext('2d').drawImage(p.canvas,0,0,tc.width,tc.height);
    tc.draggable=true;
    tc.addEventListener('dragstart',e=>{
      dragging={pieceId:pid,src:'tray'};
      tc.classList.add('dragging-src');
      e.dataTransfer.setData('text/plain',pid);
    });
    tc.addEventListener('dragend',()=>{tc.classList.remove('dragging-src');});
    tc.addEventListener('click',()=>tapTrayPiece(pid));
    tray.appendChild(tc);
  });
}

let selectedTrayPiece=null;
function tapTrayPiece(pid){
  selectedTrayPiece=pid;
  document.querySelectorAll('.tray-piece').forEach(t=>t.style.outline='none');
  const el=document.querySelector(`.tray-piece[data-pid="${pid}"]`);
  if(el)el.style.outline='2px solid #218fa0';
}

document.getElementById('board-canvas').addEventListener('dragover',e=>{e.preventDefault();});
document.getElementById('board-canvas').addEventListener('drop',e=>{
  e.preventDefault();
  const pid=parseInt(e.dataTransfer.getData('text/plain'));
  const rect=e.currentTarget.getBoundingClientRect();
  const x=e.clientX-rect.left,y=e.clientY-rect.top;
  const slot=Math.floor(x/cellW)+Math.floor(y/cellH)*COLS;
  placePiece(pid,slot);
});
document.getElementById('board-canvas').addEventListener('click',e=>{
  if(selectedTrayPiece===null)return;
  const rect=e.currentTarget.getBoundingClientRect();
  const x=e.clientX-rect.left,y=e.clientY-rect.top;
  const slot=Math.floor(x/cellW)+Math.floor(y/cellH)*COLS;
  placePiece(selectedTrayPiece,slot);
  selectedTrayPiece=null;
});

function placePiece(pid,slot){
  if(slot<0||slot>=TOTAL)return;
  if(boardSlots[slot]!==null)return;
  const p=pieces.find(p=>p.id===pid);
  if(!p||p.placed)return;
  boardSlots[slot]=pid;p.currentSlot=slot;p.placed=true;
  const isCorrect=(slot%COLS===p.correctCol&&Math.floor(slot/COLS)===p.correctRow);
  const diffMult={easy:1,medium:1.5,hard:2,expert:3}[difficulty];
  const timeBonus=Math.max(0,300-timerSec);
  const pts=Math.round((isCorrect?150:30)*(1+timeBonus/300)*diffMult);
  score+=pts;document.getElementById('sc-score').textContent=score;
  if(!isCorrect){
    setTimeout(()=>{boardSlots[slot]=null;p.placed=false;p.currentSlot=null;renderBoard();renderTray();},600);
  }
  renderBoard();updateProgress();
  if(isCorrect){trayOrder=trayOrder.filter(id=>id!==pid);renderTray();checkWin();}
}

function updateProgress(){
  const placed=pieces.filter(p=>p.placed).length;
  document.getElementById('sc-left').textContent=TOTAL-placed;
  document.getElementById('p-progress').style.width=(placed/TOTAL*100)+'%';
}

function shuffleTray(){trayOrder=trayOrder.sort(()=>Math.random()-.5);renderTray();}

function autoSolveOne(){
  const unplaced=pieces.filter(p=>!p.placed);if(!unplaced.length)return;
  const p=unplaced[Math.floor(Math.random()*unplaced.length)];
  const slot=p.correctRow*COLS+p.correctCol;
  if(boardSlots[slot]!==null)return;
  score=Math.max(0,score-100);document.getElementById('sc-score').textContent=score;
  placePiece(p.id,slot);
}

function resetPuzzle(){
  buildPieces();renderBoard();renderTray();
  score=0;timerSec=0;document.getElementById('sc-score').textContent=0;updateProgress();
}

function checkWin(){
  const allPlaced=pieces.every(p=>p.placed);if(!allPlaced)return;
  stopTimer();gameActive=false;
  const isNew=saveHS(score);refreshHSDisplay();
  document.getElementById('win-time').textContent=formatTime(timerSec);
  document.getElementById('win-score').textContent=score;
  document.getElementById('win-hs').style.display=isNew?'block':'none';
  document.getElementById('win-overlay').classList.add('show');
}

function closeWin(){document.getElementById('win-overlay').classList.remove('show');startGame();}

function goGallery(){
  stopTimer();gameActive=false;
  document.getElementById('win-overlay').classList.remove('show');
  document.getElementById('puzzle-screen').style.display='none';
  document.getElementById('gallery-screen').style.display='block';
}

function startTimer(){
  stopTimer();
  timerInt=setInterval(()=>{timerSec++;document.getElementById('p-timer').textContent=formatTime(timerSec);},1000);
}
function stopTimer(){clearInterval(timerInt);}
function formatTime(s){return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}

window.addEventListener('load',()=>{
  buildGallery();
  document.getElementById('sc-diff').textContent='Easy';
  refreshHSDisplay();
});
</script>
